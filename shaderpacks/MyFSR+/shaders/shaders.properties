# scale.colortex0 — renders the scene at a fraction of display resolution
# composite.fsh bicubic-upscales colortex0 → colortex1 at full res
# final.fsh runs post-processing on full-res colortex1
#
# 0.75 = 3/4 res  — recommended start, subtle fps gain, clean image
# 0.67 = 2/3 res  — moderate fps gain
# 0.50 = half res — big fps gain, softer before upscale
# 0.25 = quarter  — stress test only

scale.colortex0 = 0.75
scale.colortex1 = 1.0
